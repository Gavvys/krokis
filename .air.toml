root = "."
testdata_dir = "testdata"
tmp_dir = ".air"

[build]
  args_bin = ["serve", "--port", "8081"]
  bin = "./tmp/krokis"
  cmd = "go build -o ./tmp/krokis ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", ".krokis", ".openspec", "node_modules", "docs", "openspec"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = ["web"]
  include_ext = ["go", "js", "css", "html", "mdx"]
  kill_delay = "1s"
  log = "build-errors.log"
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
