<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krokis Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js (Markdown parsing) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Prism.js (Syntax highlighting) -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="/styles.css">
    <!-- RapiDoc (OpenAPI UI Web Component) -->
    <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">▲</span>
                    <span class="logo-text">Krokis</span>
                </div>
                <button id="refresh-btn" class="icon-btn" type="button" title="Refresh telemetry" aria-label="Refresh telemetry">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor" d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 1 0 7.73 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35Z"/>
                    </svg>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h3>Project Wiki</h3>
                    <ul id="wiki-links">
                        <!-- Dynamic list of wiki files -->
                    </ul>
                </div>
                <div class="nav-section">
                    <h3>Telemetry & Insights</h3>
                    <ul id="telemetry-links">
                        <li><a href="#/insights/health" class="nav-link">Project Health</a></li>
                        <li><a href="#/insights/cadence" class="nav-link">Task Cadence</a></li>
						<li><a href="#/insights/flow" class="nav-link">Flow Insights</a></li>
                        <li><a href="#/insights/openapi" class="nav-link">API Specification</a></li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div id="content-container" class="content-container">
                <!-- Dynamically loaded content -->
            </div>
        </main>
    </div>

    <!-- Load components -->
    <script src="/components/InfoBox.js"></script>
    <script src="/components/MetricsCard.js"></script>
    <script src="/components/TaskCadence.js"></script>
    <script src="/components/TestResults.js"></script>
	<script src="/components/FlowInsights.js"></script>
    <script src="/components/CommitHeatmap.js"></script>
    <!-- Main App Logic -->
    <script src="/app.js"></script>
</body>
</html>
